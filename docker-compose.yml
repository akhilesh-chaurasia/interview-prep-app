version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: yt-genai-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Backend API
  backend:
    build: ./backend
    container_name: yt-genai-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/yt-genai
      - JWT_SECRET=your_jwt_secret_key_here_change_in_production
      - GOOGLE_GENAI_API_KEY=${GOOGLE_GENAI_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FRONTEND_URL=http://localhost
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build: ./FRONTEND
    container_name: yt-genai-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
